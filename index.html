<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>聊天记录查看器 - iPad 兼容</title>
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 20px;
}
#fileButton {
    display: inline-block;
    padding: 20px 30px;
    border: 2px dashed #007aff;
    border-radius: 12px;
    background: white;
    color: #007aff;
    font-weight: bold;
    cursor: pointer;
    text-align: center;
    margin-bottom: 20px;
}
.message {
    margin: 10px 0;
    padding: 12px 16px;
    border-radius: 14px;
    max-width: 70%;
    white-space: pre-wrap;
}
.user {
    background: #007aff;
    color: white;
    margin-left: auto;
}
.assistant {
    background: #e5e5ea;
    color: black;
    margin-right: auto;
}
.time {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 4px;
}
#error {
    color: red;
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>聊天记录查看器</h2>
<div id="fileButton">点击选择 JSON 文件</div>
<input type="file" id="fileInput" multiple accept=".json" style="display:none">

<div id="error"></div>
<div id="chatContainer"></div>

<script>
const fileButton = document.getElementById("fileButton");
const fileInput = document.getElementById("fileInput");
const chatContainer = document.getElementById("chatContainer");
const errorDiv = document.getElementById("error");

fileButton.onclick = () => fileInput.click();

fileInput.addEventListener("change", async e => {
    const files = e.target.files;
    if (!files.length) return;

    chatContainer.innerHTML = "";
    errorDiv.innerText = "";

    let allMessages = [];

    for (let file of files) {
        try {
            const text = await file.text();
            const json = JSON.parse(text);

            // 兼容多种结构
            if (Array.isArray(json)) {
                allMessages.push(...json);
            } else if (json.messages) {
                allMessages.push(...json.messages);
            } else if (json.conversation) {
                allMessages.push(...json.conversation);
            } else {
                allMessages.push(json);
            }
        } catch(err) {
            errorDiv.innerText += `文件 "${file.name}" 解析失败: ${err.message}\n`;
        }
    }

    if (!allMessages.length) {
        errorDiv.innerText += "没有有效消息显示，请检查 JSON 格式。";
        return;
    }

    // 按时间排序
    allMessages.sort((a, b) => (a.created_at || 0) - (b.created_at || 0));

    // 渲染消息
    allMessages.forEach(msg => {
        let role = "assistant";
        let content = "";

        if (msg.author && msg.author.role) role = msg.author.role;

        if (msg.content) {
            if (typeof msg.content === "string") {
                content = msg.content;
            } else if (msg.content.parts && Array.isArray(msg.content.parts)) {
                content = msg.content.parts.join("\n");
            }
        } else if (typeof msg === "string") {
            content = msg;
        }

        if (!content) return;

        const div = document.createElement("div");
        div.className = "message " + role;
        div.innerText = content;

        const timeDiv = document.createElement("div");
        timeDiv.className = "time";
        if (msg.created_at) {
            const date = new Date(msg.created_at * 1000);
            timeDiv.innerText = date.toLocaleString();
        }

        div.appendChild(timeDiv);
        chatContainer.appendChild(div);
    });
});
</script>

</body>
</html>
